<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mizān · Sharia-aware market intelligence</title>
  <style>
    :root {
      --navy: #18233E;
      --navy-2: #22335A;
      --navy-3: #0C1426;
      --gold: #D4AF37;
      --gold-2: #E7C766;
      --gold-soft: rgba(212,175,55,.16);
      --canvas: #0B1220;
      --card: #131E38;
      --card-2: #18243F;
      --ink: #EAF0FA;
      --muted: #93A1B8;
      --subtle: #6A7790;
      --line: rgba(255,255,255,.09);
      --soft: #111B31;
      --clean: #35C281;
      --clean-bg: rgba(33,160,98,.18);
      --purify: #F5B43C;
      --purify-bg: rgba(245,166,35,.16);
      --fail: #F0625A;
      --fail-bg: rgba(229,57,53,.17);
      --up: #57CFA0;
      --up-bg: rgba(33,160,98,.12);
      --down: #E58E89;
      --down-bg: rgba(229,57,53,.12);
      --shadow: 0 34px 80px rgba(0,0,0,.55);
      --card-shadow: 0 16px 34px rgba(0,0,0,.42);
      --radius-lg: 28px;
      --radius: 22px;
      --radius-sm: 15px;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; min-height: 100%; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 6%, rgba(212,175,55,.20), transparent 32%),
        radial-gradient(circle at 84% 90%, rgba(27,42,74,.5), transparent 40%),
        linear-gradient(160deg, #0A1020 0%, #05080F 100%);
      font-family: "Sora", "Tajawal", "Cairo", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body.rtl { direction: rtl; font-family: "Tajawal","Cairo","Segoe UI",-apple-system,sans-serif; }
    body.rtl input { text-align: right; }
    body.rtl .back-btn { transform: scaleX(-1); }
    body.rtl .toggle.on span { transform: translateX(-21px); }

    button, input { font: inherit; }
    button { border: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    h1, h2, h3, p { margin: 0; }

    .stage { width: min(100%, 452px); display: grid; gap: 14px; justify-items: center; }
    .phone {
      width: 393px;
      height: 852px;
      max-width: calc(100vw - 24px);
      max-height: calc(100vh - 24px);
      padding: 12px;
      border-radius: 44px;
      background: #111827;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .phone::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 118px;
      height: 28px;
      border-radius: 0 0 18px 18px;
      background: #111827;
      z-index: 20;
    }
    .screen {
      height: 100%;
      overflow: hidden;
      border-radius: 33px;
      background: var(--canvas);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      height: 42px;
      padding: 13px 24px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      color: white;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .15px;
      background: var(--navy);
      flex: 0 0 auto;
    }
    .status-icons { display: flex; gap: 6px; align-items: center; opacity: .92; }
    .signal { width: 16px; height: 10px; display: inline-grid; grid-template-columns: repeat(4, 3px); gap: 1px; align-items: end; }
    .signal span { width: 3px; border-radius: 2px; background: currentColor; }
    .signal span:nth-child(1) { height: 3px; }
    .signal span:nth-child(2) { height: 5px; }
    .signal span:nth-child(3) { height: 8px; }
    .signal span:nth-child(4) { height: 10px; }
    .battery { width: 22px; height: 10px; border-radius: 3px; border: 1.5px solid currentColor; position: relative; }
    .battery::before { content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 4px; border-radius: 1px; background: currentColor; }
    .battery::after { content: ""; position: absolute; right: -4px; top: 2.5px; width: 2px; height: 4px; border-radius: 0 2px 2px 0; background: currentColor; }

    #app { flex: 1; min-height: 0; position: relative; }
    .view { height: 100%; display: flex; flex-direction: column; }
    .content { flex: 1; overflow-y: auto; padding: 15px 15px 98px; scrollbar-width: none; }
    .content::-webkit-scrollbar { display: none; }

    .header {
      color: #fff;
      background:
        linear-gradient(145deg, rgba(255,255,255,.08), transparent 45%),
        linear-gradient(180deg, var(--navy) 0%, var(--navy-3) 100%);
      padding: 8px 19px 18px;
      flex: 0 0 auto;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: "";
      position: absolute;
      right: -56px;
      top: -42px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(212,175,55, .18);
      filter: blur(.3px);
    }
    .header-row, .title-row, .toolbar-row, .row-between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; position: relative; z-index: 2; }
    .brand-mark {
      width: 39px;
      height: 39px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, var(--gold), var(--gold-2));
      color: white;
      font-weight: 950;
      box-shadow: 0 12px 24px rgba(212,175,55,.26);
      flex: 0 0 auto;
    }
    .brand h1 { font-size: 18px; letter-spacing: -.35px; line-height: 1.08; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand p { margin-top: 3px; font-size: 11.5px; color: rgba(255,255,255,.70); }
    .icon-button, .back-btn {
      width: 39px;
      height: 39px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      color: white;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.10);
      position: relative;
      z-index: 2;
    }
    .icon-button:active, .card:active, .chip:active, .mini-button:active, .toggle:active { transform: scale(.98); }

    .hero-stats {
      position: relative;
      z-index: 2;
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .hero-stat {
      border-radius: 17px;
      padding: 10px;
      background: rgba(255,255,255,.095);
      border: 1px solid rgba(255,255,255,.12);
      min-width: 0;
    }
    .hero-stat b { display: block; font-size: 16px; line-height: 1.05; }
    .hero-stat span { display: block; margin-top: 4px; color: rgba(255,255,255,.66); font-size: 10.4px; font-weight: 750; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .quote-status {
      position: relative;
      z-index: 2;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.76);
      font-size: 10.8px;
      line-height: 1.24;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-inline-end: 6px; background: var(--muted); }
    .dot.live { background: #22C55E; box-shadow: 0 0 0 4px rgba(34,197,94,.16); }
    .dot.syncing { background: #F59E0B; box-shadow: 0 0 0 4px rgba(245,158,11,.16); }

    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      height: 78px;
      padding: 9px 12px 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: rgba(13,20,36,.9);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,.09);
    }
    .tab {
      display: grid;
      place-items: center;
      gap: 2px;
      border-radius: 18px;
      background: transparent;
      color: var(--muted);
      font-size: 10.7px;
      font-weight: 900;
    }
    .tab.active { color: white; background: var(--navy); box-shadow: 0 10px 20px rgba(27,42,74,.17); }
    .tab-icon { font-size: 17px; line-height: 1; }

    .section-title { color: var(--ink); font-size: 19px; letter-spacing: -.3px; }
    .section-note { color: var(--muted); font-size: 12px; line-height: 1.35; margin-top: 3px; }
    .mini-button {
      border-radius: 14px;
      padding: 9px 12px;
      font-size: 11.5px;
      font-weight: 950;
      color: var(--ink);
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 5px 12px rgba(27,42,74,.05);
    }
    .mini-button.gold { background: var(--gold); color: white; border-color: var(--gold); box-shadow: 0 9px 19px rgba(212,175,55,.22); }
    .mini-button.navy { background: var(--navy); color: white; border-color: var(--ink); }
    .mini-button.clean { color: var(--clean); background: var(--clean-bg); border-color: rgba(20,128,74,.17); }

    .decision-strip {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 10px;
      margin-bottom: 13px;
    }
    .decision-card {
      border-radius: 24px;
      padding: 14px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.09);
      box-shadow: var(--card-shadow);
      min-width: 0;
      overflow: hidden;
      position: relative;
    }
    .decision-card::after {
      content: "";
      position: absolute;
      right: -34px;
      bottom: -42px;
      width: 95px;
      height: 95px;
      border-radius: 50%;
      background: rgba(212,175,55,.10);
    }
    .decision-card small { color: var(--muted); text-transform: uppercase; letter-spacing: .45px; font-size: 10px; font-weight: 950; }
    .decision-card b { display: block; margin-top: 5px; color: var(--ink); font-size: 20px; letter-spacing: -.45px; }
    .decision-card span { display: block; margin-top: 4px; color: var(--muted); font-size: 11.2px; line-height: 1.35; }

    .filter-panel {
      border-radius: 26px;
      padding: 13px;
      margin-bottom: 13px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--card-shadow);
    }
    .search-box {
      height: 43px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-radius: 16px;
      background: var(--soft);
      border: 1px solid var(--card-2);
      color: var(--subtle);
    }
    .search-box input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-size: 13px;
      font-weight: 760;
    }
    .filter-label { margin: 12px 0 7px; color: var(--muted); text-transform: uppercase; letter-spacing: .55px; font-size: 10px; font-weight: 950; }
    .chip-row { display: flex; gap: 7px; flex-wrap: wrap; }
    .chip {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 950;
      color: var(--subtle);
      background: var(--card-2);
      border: 1px solid var(--card-2);
    }
    .chip.active { color: white; background: var(--navy); border-color: var(--ink); box-shadow: 0 7px 17px rgba(27,42,74,.15); }
    .chip.clean.active { background: var(--clean); border-color: var(--clean); }
    .chip.purify.active { background: var(--purify); border-color: var(--purify); }
    .chip.fail.active { background: var(--fail); border-color: var(--fail); }

    .results-row { margin: 0 1px 10px; color: var(--muted); display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 11.5px; }
    .results-row b { color: var(--ink); }
    .card-list { display: grid; gap: 12px; }
    .card {
      border-radius: 25px;
      padding: 14px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.09);
      box-shadow: var(--card-shadow);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease;
      overflow: hidden;
      position: relative;
    }
    .card:hover { transform: translateY(-1px); box-shadow: 0 16px 36px rgba(27,42,74,.12); }
    .card::before { content: ""; position: absolute; inset: 0 auto 0 0; width: 4px; background: var(--line); }
    .card.clean::before { background: var(--clean); }
    .card.purify::before { background: var(--purify); }
    .card.fail::before { background: var(--fail); }
    body.rtl .card::before { left: auto; right: 0; }

    .actor { display: flex; gap: 10px; align-items: center; min-width: 0; }
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: var(--ink);
      background: var(--card-2);
      border: 1px solid var(--soft);
      font-size: 11.5px;
      font-weight: 950;
    }
    .avatar.fund { border-radius: 14px; background: rgba(212,175,55,.16); color: var(--gold); border-color: rgba(212,175,55,.30); }
    .actor-name { max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); font-size: 13px; font-weight: 900; }
    .actor-sub { margin-top: 1px; color: var(--muted); font-size: 11.2px; }
    .trade-pill {
      border-radius: 999px;
      padding: 6px 9px;
      color: var(--ink);
      background: var(--card-2);
      border: 1px solid var(--soft);
      font-size: 10.8px;
      font-weight: 950;
      letter-spacing: .35px;
      white-space: nowrap;
    }
    .trade-pill.sell { color: var(--gold); background: rgba(212,175,55,.12); border-color: rgba(212,175,55,.22); }

    .ticker-line { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-top: 14px; }
    .ticker { color: var(--ink); font-size: 26px; line-height: 1; font-weight: 980; letter-spacing: -.85px; }
    .company { color: var(--muted); margin-top: 3px; font-size: 12px; line-height: 1.22; }
    .sharia-badge {
      min-width: 128px;
      border-radius: 18px;
      padding: 10px 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 12.5px;
      line-height: 1;
      font-weight: 980;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .sharia-badge.clean { color: var(--clean); background: var(--clean-bg); border-color: rgba(20,128,74,.18); }
    .sharia-badge.purify { color: var(--purify); background: var(--purify-bg); border-color: rgba(183,121,31,.22); }
    .sharia-badge.fail { color: var(--fail); background: var(--fail-bg); border-color: rgba(192,57,43,.20); }

    .info-grid { margin-top: 13px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .info-cell {
      min-width: 0;
      border-radius: 16px;
      background: var(--soft);
      border: 1px solid var(--card-2);
      padding: 9px;
    }
    .info-cell small, .metric-label, .detail-row small, .quote-row small { color: var(--muted); text-transform: uppercase; letter-spacing: .42px; font-size: 9.8px; font-weight: 950; }
    .info-cell b, .detail-row b, .quote-row b { display: block; margin-top: 3px; color: var(--ink); font-size: 11.8px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .performance-strip { margin-top: 10px; border-radius: 17px; padding: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; background: linear-gradient(145deg, #243154, var(--card-2)); border: 1px solid var(--card-2); }
    .performance-strip small { color: var(--muted); font-size: 10.5px; font-weight: 800; }
    .performance-strip b { display: block; color: var(--ink); font-size: 12.5px; margin-top: 2px; }
    .move { font-weight: 980; }
    .move.up { color: var(--up); }
    .move.down { color: var(--down); }
    .move.neutral { color: var(--muted); }

    .empty-state {
      background: var(--card);
      border: 1px dashed var(--muted);
      border-radius: 24px;
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      box-shadow: var(--card-shadow);
    }
    .footer-note { padding: 12px 8px 2px; color: var(--muted); text-align: center; font-size: 10.4px; line-height: 1.45; }

    .detail-header { color: white; background: var(--navy); padding: 8px 19px 18px; flex: 0 0 auto; }
    .detail-title-row { display: flex; gap: 10px; align-items: center; }
    .detail-title h2 { font-size: 18px; letter-spacing: -.3px; }
    .detail-title p { margin-top: 3px; color: rgba(255,255,255,.70); font-size: 12px; }
    .hero-detail {
      margin-top: 15px;
      border-radius: 24px;
      padding: 15px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.13);
    }
    .hero-main { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .hero-detail .ticker { color: white; }
    .hero-detail .company { color: rgba(255,255,255,.65); }
    .hero-detail .amount { margin-top: 13px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .hero-detail .amount div { border-radius: 16px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.09); padding: 10px; }
    .hero-detail small { color: rgba(255,255,255,.62); text-transform: uppercase; font-weight: 900; font-size: 10px; letter-spacing: .42px; }
    .hero-detail b { display: block; margin-top: 3px; color: white; font-size: 15px; }

    .panel {
      border-radius: 25px;
      padding: 15px;
      margin-bottom: 13px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--card-shadow);
    }
    .panel h3 { color: var(--ink); font-size: 15px; letter-spacing: -.12px; margin-bottom: 12px; }
    .detail-row, .quote-row {
      padding: 10.5px 0;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .detail-row:last-child, .quote-row:last-child { border-bottom: 0; }
    .status-chip { padding: 7px 10px; border-radius: 999px; font-size: 11px; font-weight: 950; white-space: nowrap; }
    .status-chip.pass { color: var(--clean); background: var(--clean-bg); }
    .status-chip.watch { color: var(--purify); background: var(--purify-bg); }
    .status-chip.fail { color: var(--fail); background: var(--fail-bg); }
    .meter-row { display: grid; grid-template-columns: 105px 1fr 46px; gap: 9px; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--line); }
    .meter-row:last-child { border-bottom: 0; }
    .meter { height: 9px; border-radius: 999px; background: var(--card-2); overflow: hidden; }
    .meter span { display: block; height: 100%; border-radius: inherit; background: var(--navy); }
    .meter.clean span { background: var(--clean); }
    .meter.purify span { background: var(--purify); }
    .meter.fail span { background: var(--fail); }
    .metric-value { text-align: end; font-size: 12px; color: var(--ink); font-weight: 900; }

    .quote-hero { border-radius: 22px; padding: 14px; background: linear-gradient(145deg, #243154, var(--card-2)); border: 1px solid var(--card-2); display: grid; gap: 11px; }
    .quote-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .quote-price { color: var(--ink); font-size: 28px; font-weight: 980; letter-spacing: -.75px; }
    .quote-sub { color: var(--muted); font-size: 11.2px; margin-top: 2px; }
    .big-move {
      border-radius: 19px;
      padding: 12px;
      border: 1px solid var(--card-2);
      background: var(--soft);
    }
    .big-move .large { font-size: 24px; font-weight: 980; letter-spacing: -.4px; }
    .big-move p { margin-top: 3px; color: var(--muted); font-size: 11.5px; line-height: 1.35; }

    .reasoning { color: var(--subtle); font-size: 13px; line-height: 1.52; }
    .purify-box {
      margin-top: 12px;
      border-radius: 20px;
      padding: 13px;
      color: var(--gold);
      background: var(--purify-bg);
      border: 1px solid rgba(183,121,31,.24);
    }
    .purify-box small { display: block; color: var(--purify); font-size: 10px; font-weight: 950; text-transform: uppercase; letter-spacing: .48px; }
    .purify-box .amount { color: var(--purify); font-size: 22px; font-weight: 980; margin-top: 4px; }
    .purify-box p { margin-top: 2px; font-size: 12px; line-height: 1.4; }
    .timeline { display: grid; gap: 9px; }
    .timeline-item { display: grid; grid-template-columns: 23px 1fr; gap: 10px; align-items: start; }
    .timeline-dot { width: 23px; height: 23px; border-radius: 50%; display: grid; place-items: center; background: var(--card-2); color: var(--ink); font-size: 11px; font-weight: 950; }
    .timeline-item b { display: block; color: var(--ink); font-size: 12.5px; }
    .timeline-item span { display: block; margin-top: 2px; color: var(--muted); font-size: 11.5px; }

    .tracker-list, .settings-grid { display: grid; gap: 12px; }
    .tracker, .setting-card {
      border-radius: 24px;
      padding: 14px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--card-shadow);
    }
    .tracker { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .tracker-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .tracker-title { color: var(--ink); font-size: 13px; font-weight: 950; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 204px; }
    .tracker-sub { color: var(--muted); margin-top: 2px; font-size: 11.4px; }

    function getQuoteMeta(trade) { return state.quotes[trade.ticker] || { price: trade.fallbackPrice, provider: "Demo", date: "Prototype" }; }
   function moveFor(trade) {
      const latest = getQuote(trade);
      const base = Number(trade.purchasePrice);
      const shares = Number(trade.shares);
      const hasQuote = Number.isFinite(latest) && latest > 0;
      if (!Number.isFinite(base) || base <= 0) {
        return { latest, delta: null, percent: null, value: null, up: true, pending: true, hasQuote };
      }
      const delta = latest - base;
      const percent = (delta / base) * 100;
      const value = Number.isFinite(shares) ? delta * shares : null;
      return { latest, delta, percent, value, up: percent >= 0, pending: false, hasQuote };
    }
    function filteredTrades() {
      let rows = [...trades];
      const { label, side, source, sort, query } = state.filters;
      if (label !== "all") rows = rows.filter(x => x.label === label);
      if (side !== "all") rows = rows.filter(x => x.side === side);
      if (source !== "all") rows = rows.filter(x => x.kind === source);
      if (query.trim()) {
        const q = query.trim().toLowerCase();
        rows = rows.filter(x => [x.actor, x.ticker, x.company, x.sector, x.kind].join(" ").toLowerCase().includes(q));
      }
      if (sort === "move") rows.sort((a, b) => Math.abs(moveFor(b).percent) - Math.abs(moveFor(a).percent));
      if (sort === "shares") rows.sort((a, b) => b.shares - a.shares);
      return rows;
    }

    async function fetchStooqQuote(ticker) {
      const url = `https://stooq.com/q/l/?s=${encodeURIComponent(ticker.toLowerCase() + '.us')}&f=sd2t2ohlcv&h&e=csv`;
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) throw new Error("Quote request failed");
      const csv = await response.text();
      const [head, row] = csv.trim().split(/\r?\n/);
      if (!head || !row) throw new Error("No quote");
      const keys = head.split(',').map(x => x.trim().toLowerCase());
      const values = row.split(',').map(x => x.trim());
      const data = Object.fromEntries(keys.map((k, i) => [k, values[i]]));
      const price = parseFloat(data.close || data.open);
      if (!Number.isFinite(price) || price <= 0) throw new Error("Invalid price");
      return { price, provider: "Stooq", date: data.date || "latest", time: data.time || "" };
    }

    async function refreshQuotes(manual = false) {
      if (state.quoteMode === "syncing") return;
      state.quoteMode = "syncing";
      render();
      const results = await Promise.allSettled(trades.map(trade => fetchStooqQuote(trade.ticker).then(q => [trade.ticker, q])));
      let success = 0;
      results.forEach(result => {
        if (result.status === "fulfilled") {
          const [ticker, quote] = result.value;
          state.quotes[ticker] = quote;
          success++;
        }
      });
      state.quoteMode = success ? "live" : "demo";
      state.lastQuoteSync = Date.now();
      render();
      if (manual) showToast(success ? `${success} quotes refreshed` : "Using demo fallback prices");
    }

    document.querySelector(".tabbar").addEventListener("click", event => {
      const tab = event.target.closest(".tab");
      if (!tab) return;
      setView(tab.dataset.tab);
    });

    // Live feed: pull disclosures from the backend when deployed; fall back to the
    // embedded seed when this file is opened standalone (offline / local preview).
    async function loadFeed() {
      try {
        const res = await fetch("/api/feed", { headers: { accept: "application/json" } });
        if (!res.ok) return false;
        const data = await res.json();
        const rows = Array.isArray(data) ? data : (data && data.disclosures) || [];
        if (!rows.length) return false;
        trades.length = 0;
        rows.forEach(r => trades.push(r));
        trades.forEach(tr => { tr.label = classifyFB(tr); }); // engine is source of truth
        return true;
      } catch (e) { return false; }
    }

    statusTime();
    setInterval(statusTime, 15000);
    render();
    loadFeed().then(changed => { if (changed) render(); });
    refreshQuotes(false);
  </script>
</body>
</html>
